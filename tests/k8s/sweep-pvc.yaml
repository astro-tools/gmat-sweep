apiVersion: v1
kind: PersistentVolume
metadata:
  name: gmat-sweep-ci-pv
spec:
  capacity:
    storage: 1Gi
  accessModes: ["ReadWriteMany"]
  hostPath:
    path: /sweep
  storageClassName: gmat-sweep-ci
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gmat-sweep-ci
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 1Gi
  storageClassName: gmat-sweep-ci
  volumeName: gmat-sweep-ci-pv
