name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }}, ${{ matrix.gmat-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      # Per-PR matrix is trimmed to 10 cells: R2026a × 3 OS × 3 Python = 9, plus
      # a single R2025a Linux/py3.12 sentinel via the `include:` below. The full
      # 3 × 3 × 2 = 18 matrix expands on `main` push to catch any cross-version
      # regression that didn't show up on the trimmed PR run. R2026a is the
      # primary target; R2025a is the previous release we still support.
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
        gmat-version: ${{ github.event_name == 'pull_request' && fromJSON('["R2026a"]') || fromJSON('["R2025a","R2026a"]') }}
        include: ${{ github.event_name == 'pull_request' && fromJSON('[{"os":"ubuntu-latest","python-version":"3.12","gmat-version":"R2025a"}]') || fromJSON('[]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: astro-tools/setup-gmat@v0
        with:
          version: ${{ matrix.gmat-version }}
          cache: true

      - name: Install project
        # `--extra dask --extra ray` so the `@pytest.mark.integration` tests
        # under `tests/test_backends_{dask,ray}.py` can spin up a real
        # `distributed.LocalCluster` / `ray.init()`. `--extra plot` so the
        # plotting-helper tests under `tests/test_plotting.py` can import
        # matplotlib. `--extra k8s` so the mock-based unit tests in
        # `tests/test_backends_kubernetes.py` (which `pytest.importorskip`
        # the kubernetes client) can run here and contribute to the
        # coverage gate — the real-cluster k8s integration tests still
        # live in the dedicated `backend-k8s` job in `integration.yml`.
        # `--extra polars` so the engine="polars" tests under
        # `tests/test_aggregate.py` contribute to the aggregate.py coverage
        # gate. `--extra sensitivity` so `tests/test_sensitivity.py` can
        # import SALib and contribute to the overall coverage gate (it
        # would otherwise skip via `pytest.importorskip("SALib")`). The
        # lint, typecheck, and minimal-install jobs deliberately keep
        # their syncs narrower.
        run: uv sync --all-groups --extra dask --extra ray --extra plot --extra k8s --extra polars --extra sensitivity

      - name: Run pytest
        # `-m "(integration or not integration) and not slow"` overrides the
        # default marker filter in pyproject.toml so CI runs both unit and
        # integration suites in a single invocation, while excluding the
        # `slow` integration tests that have their own dedicated cell
        # (see the `backend-throughput` job in `integration.yml`).
        run: uv run pytest -m "(integration or not integration) and not slow" --cov --cov-report=term-missing

      # Coverage gates run on a single matrix combination — the .coverage
      # data is identical across runners. The four per-file gates match
      # CONTRIBUTING.md.

      - name: Enforce overall coverage (>=90%)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && matrix.gmat-version == 'R2026a'
        run: uv run coverage report --fail-under=90

      - name: Enforce grids.py coverage (>=95%)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && matrix.gmat-version == 'R2026a'
        run: uv run coverage report --include='src/gmat_sweep/grids.py' --fail-under=95

      - name: Enforce distributions.py coverage (>=95%)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && matrix.gmat-version == 'R2026a'
        run: uv run coverage report --include='src/gmat_sweep/distributions.py' --fail-under=95

      - name: Enforce manifest.py coverage (>=95%)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && matrix.gmat-version == 'R2026a'
        run: uv run coverage report --include='src/gmat_sweep/manifest.py' --fail-under=95

      - name: Enforce aggregate.py coverage (>=95%)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && matrix.gmat-version == 'R2026a'
        run: uv run coverage report --include='src/gmat_sweep/aggregate.py' --fail-under=95

      # Smoke-execute the example notebooks end-to-end. Catches "someone changed
      # the public surface and forgot to refresh the committed notebook"
      # regressions without paying the cost of nbval-style strict comparison
      # (notebooks are committed with cleared outputs). One matrix combo is
      # enough — the underlying surface is covered cross-platform by the rest
      # of the test job. Notebook 03 uses signal.SIGINT against a child
      # process, so it is Linux-only (Windows lacks the matching semantics).
      - name: Smoke-execute example notebooks
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && matrix.gmat-version == 'R2026a'
        working-directory: docs/examples
        run: |
          uv sync --all-groups --extra examples
          uv run jupyter execute 01_sma_scan.ipynb
          uv run jupyter execute 02_epoch_arrival_grid.ipynb
          uv run jupyter execute 03_killed_sweep_recovery.ipynb
          uv run jupyter execute 04_monte_carlo_dispersion.ipynb
          uv run jupyter execute 05_latin_hypercube.ipynb
          uv run jupyter execute 06_dask_cluster_recipe.ipynb
          uv run jupyter execute 07_ray_autoscaling_recipe.ipynb

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-groups
      - run: uv run ruff check
      - run: uv run ruff format --check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      # mypy walks the backends/dask.py and backends/ray.py modules; their
      # `if TYPE_CHECKING: import distributed` / `import ray` references are
      # silenced by the ignore_missing_imports overrides, so the typecheck job
      # does not need the runtime extras.
      - run: uv sync --all-groups
      - run: uv run mypy

  # Smoke-check that `pip install gmat-sweep` (no extras, no dev group)
  # imports cleanly. Catches an extras-only or dev-only dependency leaking
  # into the default install path.
  minimal-install:
    name: minimal install smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install .
      - run: python -c "import gmat_sweep"

  # Validate CITATION.cff against the Citation File Format v1.2.0 schema.
  # cffconvert is installed standalone (not via uv sync) because it is a
  # CI-only schema check, not part of the dev or runtime dependency graph.
  citation:
    name: citation file (cffconvert)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install cffconvert==2.0.0
      - run: cffconvert --validate -i CITATION.cff

  # MPIPool integration cell: launches pytest under the `mpi4py.futures`
  # shim so ranks 1..K-1 are pre-allocated workers and rank 0 runs the
  # test driver. Avoids `MPI_Comm_spawn` (which on the Open MPI 4 build
  # shipped by Ubuntu requires more host slots than a free-tier runner
  # exposes, and refuses to spawn without `--oversubscribe`). Filters the
  # parametrize to the mpi rows only — the dask / ray / local rows live
  # in the `backend-equivalence` and `backend-throughput` jobs in
  # `integration.yml`. Stays on PR because it is fast (~1 min) and the
  # mpi4py.futures shim is unique surface that lints and unit tests do
  # not exercise.
  backend-mpi:
    name: backend mpi (mpi4py.futures)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: astro-tools/setup-gmat@v0
        with:
          version: R2026a
          cache: true
      # mpi4py compiles against the system MPI at install time, so the
      # libopenmpi-dev headers and the openmpi-bin runtime must be present
      # before `uv sync --extra mpi`.
      - name: Install Open MPI for the [mpi] extra
        run: sudo apt-get update && sudo apt-get install -y openmpi-bin libopenmpi-dev
      # `--extra dask --extra ray` is needed even though we only run the
      # mpi rows here: the equivalence test module has top-level
      # `pytest.importorskip("distributed")` / `("ray")` (so the dask/ray
      # cross-process-determinism tests in the same module are honest in
      # the equivalence cell). Without those packages the module would
      # skip entirely and the mpi rows would never be collected.
      - run: uv sync --all-groups --extra dask --extra ray --extra mpi
      # `mpirun -n 4 --oversubscribe python -m mpi4py.futures -m pytest …` —
      # the shim makes ranks 1..3 enter the worker loop; rank 0 runs pytest.
      # `--oversubscribe` is required because the runner has fewer cores
      # than ranks. `-k mpi` filters the parametrize so only the MPI rows
      # of the equivalence and throughput suites run here. `-s` matches the
      # throughput cell so the BenchmarkRecord JSON appears in the log even
      # on a passing run.
      - run: |
          mpirun -n 4 --oversubscribe \
            uv run python -m mpi4py.futures -m pytest \
              tests/test_backend_equivalence.py tests/test_backend_throughput.py \
              -m "integration and slow" -k mpi -s
