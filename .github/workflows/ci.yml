name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }}, ${{ matrix.gmat-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      # 3 OSes × 3 Python minors × 2 GMAT releases = 18 cells. R2026a is the
      # primary target, R2025a is the previous release we still support.
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
        gmat-version: [R2025a, R2026a]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: astro-tools/setup-gmat@v0
        with:
          version: ${{ matrix.gmat-version }}
          cache: true

      - name: Install project
        # `--extra dask --extra ray` so the `@pytest.mark.integration` tests
        # under `tests/test_backends_{dask,ray}.py` can spin up a real
        # `distributed.LocalCluster` / `ray.init()`. The lint, typecheck, and
        # minimal-install jobs deliberately keep their syncs narrower.
        run: uv sync --all-groups --extra dask --extra ray

      - name: Run pytest
        # `-m "(integration or not integration) and not slow"` overrides the
        # default marker filter in pyproject.toml so CI runs both unit and
        # integration suites in a single invocation, while excluding the
        # `slow` integration tests that have their own dedicated cell
        # (see the `backend-throughput` job below).
        run: uv run pytest -m "(integration or not integration) and not slow" --cov --cov-report=term-missing

      # Coverage gates run on a single matrix combination — the .coverage
      # data is identical across runners. The four per-file gates match
      # CONTRIBUTING.md.

      - name: Enforce overall coverage (>=85%)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && matrix.gmat-version == 'R2026a'
        run: uv run coverage report --fail-under=85

      - name: Enforce grids.py coverage (>=95%)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && matrix.gmat-version == 'R2026a'
        run: uv run coverage report --include='src/gmat_sweep/grids.py' --fail-under=95

      - name: Enforce distributions.py coverage (>=95%)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && matrix.gmat-version == 'R2026a'
        run: uv run coverage report --include='src/gmat_sweep/distributions.py' --fail-under=95

      - name: Enforce manifest.py coverage (>=95%)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && matrix.gmat-version == 'R2026a'
        run: uv run coverage report --include='src/gmat_sweep/manifest.py' --fail-under=95

      - name: Enforce aggregate.py coverage (>=95%)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && matrix.gmat-version == 'R2026a'
        run: uv run coverage report --include='src/gmat_sweep/aggregate.py' --fail-under=95

      # Smoke-execute the example notebooks end-to-end. Catches "someone changed
      # the public surface and forgot to refresh the committed notebook"
      # regressions without paying the cost of nbval-style strict comparison
      # (notebooks are committed with cleared outputs). One matrix combo is
      # enough — the underlying surface is covered cross-platform by the rest
      # of the test job. Notebook 03 uses signal.SIGINT against a child
      # process, so it is Linux-only (Windows lacks the matching semantics).
      - name: Smoke-execute example notebooks
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && matrix.gmat-version == 'R2026a'
        working-directory: docs/examples
        run: |
          uv sync --all-groups --extra examples
          uv run jupyter execute 01_sma_scan.ipynb
          uv run jupyter execute 02_epoch_arrival_grid.ipynb
          uv run jupyter execute 03_killed_sweep_recovery.ipynb
          uv run jupyter execute 04_monte_carlo_dispersion.ipynb
          uv run jupyter execute 05_latin_hypercube.ipynb
          uv run jupyter execute 06_dask_cluster_recipe.ipynb
          uv run jupyter execute 07_ray_autoscaling_recipe.ipynb

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-groups
      - run: uv run ruff check
      - run: uv run ruff format --check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      # mypy walks the backends/dask.py and backends/ray.py modules; their
      # `if TYPE_CHECKING: import distributed` / `import ray` references are
      # silenced by the ignore_missing_imports overrides, so the typecheck job
      # does not need the runtime extras.
      - run: uv sync --all-groups
      - run: uv run mypy

  # Smoke-check that `pip install gmat-sweep` (no extras, no dev group)
  # imports cleanly. Catches an extras-only or dev-only dependency leaking
  # into the default install path.
  minimal-install:
    name: minimal install smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install .
      - run: python -c "import gmat_sweep"

  # Per-backend throughput regression: runs the 50-run scaled variant of the
  # canonical reference benchmark on each of LocalJoblibPool / DaskPool /
  # RayPool and asserts each backend's measured throughput meets the floor
  # in `tests/data/throughput_floor.json`. One Linux cell on the latest
  # supported GMAT release is the gate; the docs page reports the author's
  # local 1000-run numbers separately. The MPI row runs in its own
  # `backend-mpi` cell below — it requires launching pytest under the
  # `mpi4py.futures` shim, which is incompatible with the rest of the
  # parametrize.
  backend-throughput:
    name: backend throughput regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: astro-tools/setup-gmat@v0
        with:
          version: R2026a
          cache: true
      - run: uv sync --all-groups --extra dask --extra ray
      # `-s` disables stdout capture so the test's per-backend BenchmarkRecord
      # JSON appears in the job log even on a passing run — needed to
      # recalibrate `tests/data/throughput_floor.json` from the measured
      # numbers without re-running the sweep locally.
      - run: uv run pytest tests/test_backend_throughput.py -m "integration and slow" -s

  # Cross-backend equivalence gate: runs three reference sweeps (grid, Monte
  # Carlo, Latin hypercube) on each of LocalJoblibPool / DaskPool / RayPool
  # and asserts pairwise bit-equality on the aggregated DataFrame and the
  # manifest's reproducibility-bearing fields. The contract is that the
  # `Pool` abstraction is honest — `backend=` is a true execution-only knob
  # with no observable effect on results. One Linux cell on the latest
  # supported GMAT release is the gate; cross-platform Dask/Ray equivalence
  # is out of scope (the 18-cell main matrix already covers LocalJoblibPool
  # on every OS). The MPI row runs in its own `backend-mpi` cell below.
  backend-equivalence:
    name: backend equivalence
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: astro-tools/setup-gmat@v0
        with:
          version: R2026a
          cache: true
      - run: uv sync --all-groups --extra dask --extra ray
      - run: uv run pytest tests/test_backend_equivalence.py -m "integration and slow"

  # MPIPool integration cell: launches pytest under the `mpi4py.futures`
  # shim so ranks 1..K-1 are pre-allocated workers and rank 0 runs the
  # test driver. Avoids `MPI_Comm_spawn` (which on the Open MPI 4 build
  # shipped by Ubuntu requires more host slots than a free-tier runner
  # exposes, and refuses to spawn without `--oversubscribe`). Filters the
  # parametrize to the mpi rows only — the dask / ray / local rows live
  # in `backend-equivalence` and `backend-throughput` above.
  backend-mpi:
    name: backend mpi (mpi4py.futures)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: astro-tools/setup-gmat@v0
        with:
          version: R2026a
          cache: true
      # mpi4py compiles against the system MPI at install time, so the
      # libopenmpi-dev headers and the openmpi-bin runtime must be present
      # before `uv sync --extra mpi`.
      - name: Install Open MPI for the [mpi] extra
        run: sudo apt-get update && sudo apt-get install -y openmpi-bin libopenmpi-dev
      # `--extra dask --extra ray` is needed even though we only run the
      # mpi rows here: the equivalence test module has top-level
      # `pytest.importorskip("distributed")` / `("ray")` (so the dask/ray
      # cross-process-determinism tests in the same module are honest in
      # the equivalence cell). Without those packages the module would
      # skip entirely and the mpi rows would never be collected.
      - run: uv sync --all-groups --extra dask --extra ray --extra mpi
      # `mpirun -n 4 --oversubscribe python -m mpi4py.futures -m pytest …` —
      # the shim makes ranks 1..3 enter the worker loop; rank 0 runs pytest.
      # `--oversubscribe` is required because the runner has fewer cores
      # than ranks. `-k mpi` filters the parametrize so only the MPI rows
      # of the equivalence and throughput suites run here. `-s` matches the
      # throughput cell so the BenchmarkRecord JSON appears in the log even
      # on a passing run.
      - run: |
          mpirun -n 4 --oversubscribe \
            uv run python -m mpi4py.futures -m pytest \
              tests/test_backend_equivalence.py tests/test_backend_throughput.py \
              -m "integration and slow" -k mpi -s

  # KubernetesJobPool integration cell: spins up a kind cluster, builds a
  # from-source sweep image (`FROM ghcr.io/astro-tools/gmat:R2026a +
  # pip install -e .[k8s]`), loads it into the kind node, mounts a PVC,
  # and runs the equivalence and throughput suites with the k8s row
  # active. The non-k8s parametrize rows auto-skip here because the dask
  # and ray extras are not synced — keeping the kind provisioning blast
  # radius limited to its own job.
  #
  # Driver/Pod path discipline: kind's `extraMounts` bind-mounts the
  # runner's `/sweep` into the kind node at `/sweep`; a hostPath PV on the
  # node points at the same path; Pods mount the PVC at `/sweep`. Net
  # effect: the driver-side `/sweep` and Pod-side `/sweep` are the same
  # directory, so paths inside RunSpec resolve identically on both sides
  # without translation.
  backend-k8s:
    name: backend k8s (kind)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GMAT_SWEEP_K8S_IMAGE: gmat-sweep-k8s-ci:local
      GMAT_SWEEP_K8S_PVC: gmat-sweep-ci
      GMAT_SWEEP_K8S_MOUNT_PATH: /sweep
      GMAT_SWEEP_K8S_DRIVER_MOUNT_PATH: /sweep
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: astro-tools/setup-gmat@v0
        with:
          version: R2026a
          cache: true
      - name: Prepare shared /sweep directory
        run: sudo mkdir -p /sweep && sudo chmod 777 /sweep
      - name: Provision kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: gmat-sweep
          config: tests/k8s/kind-config.yaml
      - name: Build sweep CI image
        run: docker build -t gmat-sweep-k8s-ci:local -f tests/k8s/Dockerfile .
      - name: Load image into kind
        run: kind load docker-image gmat-sweep-k8s-ci:local --name gmat-sweep
      - name: Apply PV + PVC
        run: kubectl apply -f tests/k8s/sweep-pvc.yaml
      - run: uv sync --all-groups --extra k8s
      - run: uv run pytest tests/test_backend_equivalence.py tests/test_backend_throughput.py -m "integration and slow" -k "k8s" -s
